name: Sync and Process Clash Configs

on:
  schedule:
    # 北京时间凌晨 00:00（即 UTC 时间前一天 16:00）
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create required directories inside Clash
        run: |
          mkdir -p Clash/5minutes Clash/10minutes Clash/15minutes Clash/30minutes Clash/60minutes

      - name: Run sync and modification script
        shell: python
        run: |
          import os
          import urllib.request
          import hashlib
          import re

          # 18个目标文件的远程 URL 列表
          urls = [
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_AdblockPlus.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_NoAuto.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_NoReject.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_MultiCountry.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini_AdblockPlus.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini_NoAuto.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini_Fallback.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini_MultiMode.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini_Ai.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Mini_MultiCountry.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_NoAuto.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_AdblockPlus.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_Netflix.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_Google.ini",
              "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_MultiMode.ini"
          ]

          folders = {
              "Clash/5minutes": 300,
              "Clash/10minutes": 600,
              "Clash/15minutes": 900,
              "Clash/30minutes": 1800,
              "Clash/60minutes": 3600
          }

          def get_sha256(data):
              return hashlib.sha256(data).hexdigest()

          def get_file_sha256(path):
              if not os.path.exists(path):
                  return None
              with open(path, 'rb') as f:
                  return hashlib.sha256(f.read()).hexdigest()

          interval_pattern = re.compile(r'(`)(\d+)(,,\d+)')

          has_updates = False

          for url in urls:
              filename = url.split('/')[-1]
              local_5min_path = os.path.join("Clash/5minutes", filename)

              print(f"--- Processing: {filename} ---")

              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30) as response:
                      remote_data = response.read()
              except Exception as e:
                  print(f"Error downloading {filename}: {e}. Skipping.")
                  continue

              remote_hash = get_sha256(remote_data)
              
              try:
                  with urllib.request.urlopen(req, timeout=30) as response_check:
                      remote_data_check = response_check.read()
                  if get_sha256(remote_data_check) != remote_hash:
                      print(f"Validation failed for {filename}. Skipping.")
                      continue
              except Exception as e:
                  print(f"Validation request failed for {filename}: {e}. Skipping.")
                  continue

              local_hash = get_file_sha256(local_5min_path)
              if local_hash == remote_hash:
                  print(f"No changes detected for {filename}. Skipping.")
                  continue

              print(f"New or modified file detected: {filename}. Processing folders...")
              has_updates = True

              content_str = remote_data.decode('utf-8', errors='ignore')

              for folder, seconds in folders.items():
                  target_path = os.path.join(folder, filename)
                  
                  if folder.endswith("/5minutes"):
                      with open(target_path, 'w', encoding='utf-8') as f:
                          f.write(content_str)
                  else:
                      lines = content_str.splitlines()
                      new_lines = []
                      for line in lines:
                          if line.startswith("custom_proxy_group=") and ",," in line:
                              line = interval_pattern.sub(rf'\g<1>{seconds}\g<3>', line)
                          new_lines.append(line)
                      
                      with open(target_path, 'w', encoding='utf-8') as f:
                          f.write('\n'.join(new_lines) + '\n')

          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f"HAS_UPDATES={has_updates}\n")

      - name: Commit and Push changes
        if: ${{ env.HAS_UPDATES == 'True' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Clash/
          git commit -m "Automated Sync: Updated Clash configs"
          git push
